name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Basic launch doctor (dev)
        env:
          NODE_ENV: development
          SESSION_SECRETS: "ci_dummy_$(openssl rand -hex 32),ci_dummy_$(openssl rand -hex 32)"
          CAPTCHA_SIGNING_SECRET: "ci_dummy_$(openssl rand -hex 32)"
        run: node scripts/doctor.js

      - name: npm audit (fail on high)
        run: npm audit --audit-level=high
