server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: dokumanlarim-security
    static_configs:
      - targets:
          - localhost
        labels:
          job: dokumanlarim
          stream: security
          __path__: /var/log/dokumanlarim/security.log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            event: event
            severity: severity
            tenantId: tenantId
      - labels:
          event:
          severity:
          tenantId:

  - job_name: dokumanlarim-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: dokumanlarim
          stream: access
          __path__: /var/log/dokumanlarim/access.log
