services:
  portal:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - TRUST_PROXY=1
      - FORCE_HTTPS=0
      - COOKIE_SECURE=0
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./uploads_tmp:/app/uploads_tmp
      - ./backups:/app/backups
      - ./exports:/app/exports
